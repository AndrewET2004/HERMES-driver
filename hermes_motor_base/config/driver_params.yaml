# ──────────────────────────────────────────────────────────────────
# HERMES Driver Parameters (update accordingly)
# ──────────────────────────────────────────────────────────────────
diff_drive_controller:
  ros__parameters:
    # ── Kinematics ────────────────────────────────────────────────
    wheel_separation: 0.30    # metres – centre-to-centre of wheels
    wheel_radius:     0.035   # metres

    # ── Motor limits ──────────────────────────────────────────────
    max_rpm: 200.0            # free-spin RPM of your DC motors

    # ── PWM ───────────────────────────────────────────────────────
    pwm_frequency: 1000       # Hz  (frequency at which the PWM signal is generated)

    # Minimum PWM duty-cycle fraction (0–1) applied whenever a non-zero speed
    # command is issued.  Ensures motors can always overcome static friction
    # even for small cmd_vel inputs.  Set to 0.0 to disable.
    min_pwm_fraction: 0.15

    # Normalised-speed deadband (0–1).  Wheel commands whose magnitude falls
    # below this fraction of max speed are treated as zero.  Prevents
    # navigation micro-corrections from snapping the motor to min_pwm and
    # causing oscillation / overshoot.  Set to 0.0 to disable.
    velocity_deadband: 0.05

    # ── GPIO Chip ────────────────────────────────────────────────────
    gpio_chip: gpiochip0          # Linux GPIO character device name

    # ── GPIO Pin Map (BCM numbering) ─────────────────────────────
    # Motor A  (left)
    gpio_pwma: 12
    gpio_ain1: 23
    gpio_ain2: 24

    # Motor B  (right)
    gpio_pwmb: 13
    gpio_bin1: 27
    gpio_bin2: 22

    # Standby
    gpio_stby: 25