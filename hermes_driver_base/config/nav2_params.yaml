# ──────────────────────────────────────────────────────────────────────────
# HERMES Nav2 Configuration
#
# Tuned for the HERMES differential-drive rover:
#   Wheel separation : 0.30 m
#   Wheel radius     : 0.035 m
#   Max linear speed : ~0.50 m/s  (conservative; matches ros2_controllers.yaml)
#   Max angular speed: ~1.50 rad/s
#
# ── How to use ────────────────────────────────────────────────────────────
# Launch nav2 with:
#   ros2 launch nav2_bringup navigation_launch.py \
#     params_file:=<path_to_this_file>
#
# ── Sensors ───────────────────────────────────────────────────────────────
# The costmap sensor layers below are placeholders.  Replace the
# scan/point-cloud topic names and sensor specs to match your hardware
# (LIDAR, depth camera, etc.).  If you only have a laser scanner, remove
# the obstacle_layer and use only the voxel_layer or vice-versa.
# ──────────────────────────────────────────────────────────────────────────

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigate_to_pose:
      plugins: ["navigate_to_pose_w_replanning_and_recovery"]
    navigate_through_poses:
      plugins: ["navigate_through_poses_w_replanning_and_recovery"]
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_smoother_selector_bt_node
      - nav2_progress_checker_selector_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node

# ── Controller server ──────────────────────────────────────────────────────
# Uses the Regulated Pure Pursuit (RPP) controller which tracks curved paths
# smoothly and naturally decelerates on sharp bends – a much better fit for
# differential-drive robots than the default DWB planner.
#
# RPP is part of the standard nav2 installation:
#   sudo apt install ros-$ROS_DISTRO-nav2-regulated-pure-pursuit-controller
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0

    # Thresholds below which a velocity is considered "stopped"
    min_x_velocity_threshold:     0.001
    min_y_velocity_threshold:     0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 15.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.20     # metres
      yaw_goal_tolerance: 0.20    # radians

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # ── Desired speeds ────────────────────────────────────────────────────
      desired_linear_vel: 0.35      # m/s – cruise speed along the path
      min_approach_linear_velocity: 0.10  # m/s – slow down near the goal

      # ── Lookahead ─────────────────────────────────────────────────────────
      # A larger lookahead produces smoother motion; a smaller one tracks the
      # path more tightly.  Increase if the robot oscillates; decrease if it
      # cuts corners.
      lookahead_dist: 0.50          # metres (fixed when use_velocity_scaled=false)
      min_lookahead_dist: 0.30
      max_lookahead_dist: 0.90
      lookahead_time: 1.5           # seconds (used when use_velocity_scaled=true)
      use_velocity_scaled_lookahead_dist: false

      # ── Rotation to heading ───────────────────────────────────────────────
      # When the robot is far off the path heading, rotate in place first.
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785   # 45° – threshold for rotate-in-place
      rotate_to_heading_angular_vel: 0.8   # rad/s – speed for in-place rotation
      max_angular_accel: 0.8               # rad/s²

      # ── Regulated linear velocity scaling ────────────────────────────────
      # Slow down based on path curvature so the robot does not overshoot bends.
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.50
      regulated_linear_scaling_min_speed: 0.15
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 0.25

      # ── Cost-based scaling (disable if no costmap obstacles) ──────────────
      use_cost_regulated_linear_velocity_scaling: false

      # ── Approach velocity ─────────────────────────────────────────────────
      approach_velocity_scaling_dist: 0.80  # metres – begin slowing this far from goal

      # ── Collision avoidance ───────────────────────────────────────────────
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

      # ── Miscellaneous ─────────────────────────────────────────────────────
      allow_reversing: false
      transform_tolerance: 0.2
      max_robot_pose_search_dist: 10.0

# ── Smoother server ────────────────────────────────────────────────────────
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ── Planner server ─────────────────────────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

# ── Behavior server ────────────────────────────────────────────────────────
behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0    # rad/s – keep recovery rotations gentle
    min_rotational_vel: 0.4
    rotational_acc_lim: 0.8
    max_linear_vel:  0.25      # m/s – gentle backup speed
    min_linear_vel:  0.10
    linear_acc_lim:  0.3

# ── Waypoint follower ──────────────────────────────────────────────────────
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200  # milliseconds

# ── Velocity smoother ──────────────────────────────────────────────────────
# Applies jerk limits to the cmd_vel stream so abrupt motor commands are
# ramped, reducing mechanical stress and helping the robot not overshoot.
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity:     [ 0.50,  0.0,  1.50]
    min_velocity:     [-0.50,  0.0, -1.50]
    max_accel:        [ 0.40,  0.0,  1.00]
    max_decel:        [-0.40,  0.0, -1.00]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ── Local costmap ──────────────────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05

      # Robot footprint – conservative circular approximation.
      # Replace with your actual polygon if the robot is not roughly circular.
      robot_radius: 0.18

      # ── Sensor layers ─────────────────────────────────────────────────────
      # Add your sensor plugin(s) here.  Examples for a 2-D laser scanner:
      #
      #   plugins: ["obstacle_layer", "inflation_layer"]
      #
      #   obstacle_layer:
      #     plugin: "nav2_costmap_2d::ObstacleLayer"
      #     enabled: true
      #     observation_sources: scan
      #     scan:
      #       topic: /scan
      #       max_obstacle_height: 2.0
      #       clearing: true
      #       marking: true
      #       data_type: "LaserScan"
      #
      plugins: ["inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35

      always_send_full_costmap: true

# ── Global costmap ─────────────────────────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link

      robot_radius: 0.18

      resolution: 0.05
      track_unknown_space: true

      # ── Sensor layers ─────────────────────────────────────────────────────
      # Add your sensor plugin(s) here (same as local costmap above).
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35

      always_send_full_costmap: true

# ── Map server ─────────────────────────────────────────────────────────────
map_server:
  ros__parameters:
    use_sim_time: false
    # Path to a pre-built map .yaml file.  Replace with your actual map.
    yaml_filename: ""

# ── Map saver ──────────────────────────────────────────────────────────────
map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ── AMCL (localisation) ─────────────────────────────────────────────────────
# Only needed when navigating with a pre-built map.  If you are using SLAM
# (e.g. slam_toolbox) you can remove this section.
amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    # Replace with your laser scanner topic:
    scan_topic: /scan
